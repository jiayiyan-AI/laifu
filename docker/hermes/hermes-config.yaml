# ============================================================================
# Hermes 模型配置 — env 驱动,多 provider 并存
# ============================================================================
# 切换模型只需改 .env 里的 HERMES_MODEL,无需改这个文件。
# 已支持:
#   anthropic/claude-sonnet-4-6  → 走 anthropic provider (Hermes 内置)
#   qwen-plus / qwen-max / ...   → 走 custom provider (DashScope OpenAI 兼容端点)
# 加新 provider:在下面 providers: 块加一节,设好 base_url + api_key 即可。
# ============================================================================

model:
  # 默认 Claude Sonnet 4.6。改 .env 的 HERMES_MODEL 即可覆盖。
  default: "${HERMES_MODEL}"

providers:
  # ── Anthropic (内置,无需 base_url) ────────────────────────────────
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    request_timeout_seconds: 120
    stale_timeout_seconds: 300

  # ── DashScope (OpenAI 兼容端点,通过 custom provider 接入) ─────────
  # 只有 HERMES_MODEL 选 qwen-* 时才会用到。key 没填不影响 Anthropic 路径。
  custom:
    base_url: "${DASHSCOPE_BASE_URL}"
    api_key: "${DASHSCOPE_API_KEY}"
    request_timeout_seconds: 120
    stale_timeout_seconds: 300
