# ============================================================================
# Hermes 模型配置 —— 接 Anthropic Claude
# ============================================================================
# Anthropic 是 Hermes 内置 provider,不需要 base_url / custom 配置。
# Hermes 读 ANTHROPIC_API_KEY 作为鉴权 key（由 .env 注入）。
# ============================================================================

model:
  # Claude Sonnet 4.6 (2026 最新一代)
  default: "anthropic/claude-sonnet-4-6"

  # Hermes 内置 anthropic provider,不需要 provider/base_url
  # 仅靠 model 前缀 "anthropic/" 自动路由

  # Hermes 支持在 config.yaml 中用 ${VAR} 语法插值环境变量,启动时自动替换。
  # 这样 key 永远不会以明文形式写入 volume 内的 config.yaml。
  # 注意:必须用 ${VAR} 写法,裸 $VAR 不会被插值。
  api_key: "${ANTHROPIC_API_KEY}"

# Anthropic 端点默认超时已经合理,这里给一份显式配置方便后续调整
providers:
  anthropic:
    request_timeout_seconds: 120
    stale_timeout_seconds: 300
