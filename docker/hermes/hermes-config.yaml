# ============================================================================
# Hermes 模型配置 — 当前锁 DashScope (阿里百炼 qwen-*)
# ============================================================================
# Hermes 的模型路由不是按 model 名前缀自动匹配 provider,而是看 model: 段
# 里显式写的 provider 字段。所以这里直接锁 custom + DashScope endpoint。
#
# HERMES_MODEL 仍由 env 注入 (qwen-plus / qwen-max / ...),只能在 DashScope
# 模型清单内切。想换回 Anthropic Claude 需要改这个文件 + 重 build 镜像。
# ============================================================================

model:
  default: "${HERMES_MODEL}"
  provider: custom
  base_url: "${DASHSCOPE_BASE_URL}"
  api_key: "${DASHSCOPE_API_KEY}"
  request_timeout_seconds: 120
  stale_timeout_seconds: 300
