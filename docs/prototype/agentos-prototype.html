<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>灵犀 · 数字员工平台</title>
<style>
/* ============================ DESIGN TOKENS ============================ */
:root{
  --bg:#f5f6f8; --panel:#ffffff; --panel2:#fafafc; --hover:#f3f2f9;
  --border:#e7e8ed; --border2:#eef0f3;
  --text:#1b1c20; --text2:#5a5c66; --text3:#9b9da6;
  --accent:#7c3aed; --accent-d:#6d28d9; --accent-weak:#f2ecfe; --accent-weak2:#f7f3ff;
  --ok:#16a34a; --ok-w:#e7f6ec; --run:#2563eb; --run-w:#e8f0fe; --warn:#d97706; --bad:#dc2626; --bad-w:#fdecec;
  --radius:12px; --radius-s:9px; --shadow:0 1px 2px rgba(16,18,30,.04),0 4px 16px rgba(16,18,30,.06);
  --shadow-l:0 10px 40px rgba(16,18,30,.16);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
#app{ height:100vh; }
button{ font-family:inherit; font-size:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input,textarea{ font-family:inherit; font-size:inherit; }
::selection{ background:rgba(124,58,237,.18); }
::-webkit-scrollbar{ width:10px;height:10px; }
::-webkit-scrollbar-thumb{ background:#d6d8df; border-radius:8px; border:2px solid transparent; background-clip:content-box; }
::-webkit-scrollbar-thumb:hover{ background:#c2c4cd; background-clip:content-box; }

/* ============================ PRIMITIVES ============================ */
.avatar{ display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 14px; border-radius:10px;
  font-weight:500; transition:.15s; border:1px solid transparent; white-space:nowrap; }
.btn-primary{ background:var(--accent); color:#fff; }
.btn-primary:hover{ background:var(--accent-d); }
.btn-primary:disabled{ background:#e7e3f5; color:#b3a9d6; cursor:default; }
.btn-ghost{ background:var(--panel); border-color:var(--border); color:var(--text); }
.btn-ghost:hover{ background:var(--hover); border-color:#dcdde3; }
.btn-soft{ background:var(--accent-weak); color:var(--accent-d); }
.btn-soft:hover{ background:#ebe2fd; }
.badge{ display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:999px; font-size:11.5px; font-weight:500; }
.chip{ display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:8px; background:#f1f2f5; color:var(--text2); font-size:12px; }
.card{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
.input{ width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:var(--panel); transition:.15s; outline:none; }
.input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
.muted{ color:var(--text2); } .dim{ color:var(--text3); }
.h1{ font-size:21px; font-weight:650; letter-spacing:-.01em; }
.h2{ font-size:15px; font-weight:600; }
.dot{ width:7px; height:7px; border-radius:50%; display:inline-block; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }
.pulse{ animation:pulse 1.6s infinite; }
@keyframes spin{ to{transform:rotate(360deg)} } .spin{ animation:spin .9s linear infinite; display:inline-flex; }
@keyframes fade{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} } .fade{ animation:fade .22s ease both; }
@keyframes blink{ 0%,80%,100%{opacity:.25} 40%{opacity:1} }

/* ============================ APP SHELL ============================ */
.shell{ display:flex; height:100vh; }
.rail{ width:236px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.rail-brand{ display:flex; align-items:center; gap:10px; padding:18px 18px 14px; }
.rail-brand .name{ font-size:16px; font-weight:650; letter-spacing:-.01em; }
.rail-brand .sub{ font-size:11px; color:var(--text3); }
.nav{ padding:8px 12px; display:flex; flex-direction:column; gap:2px; flex:1; }
.nav-label{ font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; padding:12px 10px 6px; }
.nav-item{ display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:9px; color:var(--text2); font-weight:500; transition:.12s; }
.nav-item:hover{ background:var(--hover); color:var(--text); }
.nav-item.active{ background:var(--accent-weak); color:var(--accent-d); }
.nav-item .ico{ display:inline-flex; }
.rail-user{ border-top:1px solid var(--border); padding:12px; display:flex; align-items:center; gap:10px; cursor:pointer; }
.rail-user:hover{ background:var(--hover); }
.rail-user .nm{ font-size:13px; font-weight:600; } .rail-user .em{ font-size:11px; color:var(--text3); }
.rail-convs{ flex:1; overflow:auto; }
.acct-pop{ position:absolute; left:12px; bottom:62px; width:230px; max-width:calc(100% - 24px); background:var(--panel); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow-l); padding:6px; z-index:60; }
.acct-pop .ap-head{ display:flex; align-items:center; gap:10px; padding:8px 10px 10px; }
.acct-pop .ap-head .nm{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.acct-pop .ap-head .em{ font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.acct-pop .ap-sep{ height:1px; background:var(--border); margin:4px 6px; }
.acct-pop button{ width:100%; text-align:left; display:flex; align-items:center; gap:11px; padding:8px 10px; border-radius:9px; font-size:13.5px; color:var(--text); }
.acct-pop button .ai{ color:var(--text3); display:inline-flex; }
.acct-pop button:hover{ background:var(--hover); }
.acct-pop button.danger{ color:var(--bad); } .acct-pop button.danger .ai{ color:var(--bad); }
.main{ flex:1; display:flex; flex-direction:column; min-width:0; }
.topbar{ height:56px; flex-shrink:0; border-bottom:1px solid var(--border); background:var(--panel);
  display:flex; align-items:center; gap:12px; padding:0 22px; }
.topbar .t{ font-size:15px; font-weight:600; }
.content{ flex:1; overflow:auto; }
.pad{ padding:24px; }
.maxw{ max-width:1080px; margin:0 auto; }

/* ============================ STORE ============================ */
.grid{ display:grid; gap:14px; }
.store-grid{ grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); }
.prod{ padding:18px; display:flex; flex-direction:column; }
.prod .skills{ display:flex; flex-wrap:wrap; gap:6px; margin:12px 0 14px; }

/* ============================ AGENTS ============================ */
.agent-row{ padding:16px; display:flex; align-items:center; gap:14px; }
.tabs{ display:flex; gap:4px; border-bottom:1px solid var(--border); padding:0 22px; background:var(--panel); }
.tab{ padding:13px 4px; margin:0 10px 0 0; color:var(--text2); font-weight:500; border-bottom:2px solid transparent; margin-bottom:-1px; }
.tab.active{ color:var(--accent-d); border-bottom-color:var(--accent); }
.cap-grid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); }
.cap{ padding:15px; border:1px solid var(--border); border-radius:12px; text-align:left; transition:.15s; background:var(--panel); }
.cap:hover{ border-color:#d8d2ee; }
.cap.on{ border-color:var(--accent); background:var(--accent-weak2); }

/* ============================ CHAT ============================ */
.chat{ display:flex; height:100%; }
.chat-list{ width:248px; flex-shrink:0; border-right:1px solid var(--border); background:var(--panel); overflow:auto; }
.chat-list-h{ padding:16px 16px 8px; font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; }
.conv{ display:flex; align-items:center; gap:11px; padding:11px 14px; cursor:pointer; border-left:2px solid transparent; }
.conv:hover{ background:var(--hover); } .conv.active{ background:var(--accent-weak2); border-left-color:var(--accent); }
.chat-main{ flex:1; display:flex; flex-direction:column; min-width:0; background:var(--panel2); }
.chat-head{ height:60px; flex-shrink:0; border-bottom:1px solid var(--border); background:var(--panel); display:flex; align-items:center; gap:12px; padding:0 20px; }
.msgs{ flex:1; overflow:auto; padding:24px; display:flex; flex-direction:column; gap:16px; }
.msg{ display:flex; gap:10px; max-width:74%; }
.msg.me{ align-self:flex-end; flex-direction:row-reverse; }
.bubble{ padding:10px 14px; border-radius:14px; box-shadow:var(--shadow); }
.msg.them .bubble{ background:var(--panel); border-top-left-radius:4px; }
.msg.me .bubble{ background:var(--accent); color:#fff; border-top-right-radius:4px; }
.composer{ flex-shrink:0; border-top:1px solid var(--border); background:var(--panel); padding:14px 20px; display:flex; gap:10px; align-items:flex-end; }
.composer textarea{ flex:1; resize:none; border:1px solid var(--border); border-radius:12px; padding:10px 12px; max-height:120px; outline:none; }
.composer textarea:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
.typing span{ width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;margin:0 1px;animation:blink 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}

/* ============================ DASHBOARD (history) ============================ */
.dash{ display:flex; height:100%; }
.dash-col{ overflow:auto; }
.dash-agents{ width:200px; flex-shrink:0; border-right:1px solid var(--border); background:var(--panel); }
.dash-threads{ width:288px; flex-shrink:0; border-right:1px solid var(--border); background:var(--panel2); }
.dash-detail{ flex:1; min-width:0; }
.col-h{ padding:14px 16px; font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; position:sticky; top:0; background:inherit; }
.ag-item{ display:flex; align-items:center; gap:9px; padding:9px 12px; margin:0 8px; border-radius:8px; cursor:pointer; }
.ag-item:hover{ background:var(--hover); } .ag-item.active{ background:var(--accent-weak); color:var(--accent-d); }
.thr-item{ padding:13px 16px; border-bottom:1px solid var(--border2); cursor:pointer; }
.thr-item:hover{ background:var(--hover); } .thr-item.active{ background:#fff; box-shadow:inset 2px 0 0 var(--accent); }
.timeline{ position:relative; padding-left:24px; }
.timeline:before{ content:''; position:absolute; left:7px; top:4px; bottom:4px; width:2px; background:var(--border); }
.tl-node{ position:relative; margin-bottom:18px; }
.tl-dot{ position:absolute; left:-24px; top:2px; width:14px; height:14px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 0 1px var(--border); }

/* ============================ MODAL / TOAST ============================ */
.overlay{ position:fixed; inset:0; background:rgba(20,20,30,.4); display:flex; align-items:center; justify-content:center; padding:16px; z-index:5000; }
.modal{ background:var(--panel); border-radius:18px; box-shadow:var(--shadow-l); width:440px; max-width:100%; padding:22px; }
.toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:28px; z-index:9999; background:#1b1c20; color:#fff;
  padding:11px 16px; border-radius:12px; font-size:13px; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-l); }
.plan-row{ width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border:1px solid var(--border); border-radius:11px; transition:.15s; }
.plan-row.sel{ border-color:var(--accent); background:var(--accent-weak2); }
.progress{ height:6px; background:#eceaf5; border-radius:99px; overflow:hidden; }
.progress > div{ height:100%; background:var(--accent); transition:width .4s; }

/* ============================ AUTH ============================ */
.auth{ height:100vh; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(900px 600px at 15% 10%, #efe7ff, transparent 60%), radial-gradient(700px 500px at 90% 90%, #e3ecff, transparent 55%), #f5f6f8; }
.auth-card{ width:392px; max-width:92vw; padding:30px; background:#fff; border-radius:20px; box-shadow:var(--shadow-l); }
.seg{ display:flex; gap:4px; background:#f1f2f5; padding:4px; border-radius:11px; margin-bottom:18px; }
.seg button{ flex:1; padding:8px; border-radius:8px; font-weight:500; color:var(--text2); }
.seg button.active{ background:#fff; color:var(--text); box-shadow:var(--shadow); }

/* ============================ MOBILE ============================ */
.tabbar{ display:none; }
@media(max-width:760px){
  .rail{ display:none; }
  .main{ padding-bottom:60px; }
  .tabbar{ display:flex; position:fixed; bottom:0; inset-inline:0; height:60px; background:var(--panel);
    border-top:1px solid var(--border); z-index:900; }
  .tabbar button{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--text3); font-size:10.5px; }
  .tabbar button.active{ color:var(--accent-d); }
  .chat-list, .dash-agents, .dash-threads{ width:140px; }
  .chat .chat-list{ width:108px; }
  .store-grid{ grid-template-columns:1fr; }
  .topbar{ padding:0 16px; } .pad{ padding:16px; }
  .msg{ max-width:86%; }
}
.hide{ display:none !important; }
</style>
</head>

<div id="app"></div>
<script>
/* ============================ ICONS ============================ */
const ICONS={

  refresh:'<path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>',

  card:'<rect width="20" height="14" x="2" y="5" rx="2.5"/><path d="M2 10h20"/>',

  chart:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7" rx="1"/><rect x="12" y="7" width="3" height="11" rx="1"/><rect x="17" y="13" width="3" height="5" rx="1"/>',

  phone:'<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/>',

};
function icon(n,o){ o=o||{}; const s=o.size||18,w=o.sw||1.7,c=o.cls||''; const st=o.color?`color:${o.color}`:''; return `<svg class="${c}" style="${st};display:inline-block;vertical-align:middle" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round">${ICONS[n]||''}</svg>`; }
function avatar(n,color,size){ size=size||40; const r=Math.round(size*0.28),inner=Math.round(size*0.5); return `<span class="avatar" style="width:${size}px;height:${size}px;border-radius:${r}px;background:${color}1f;color:${color}">${icon(n,{size:inner,sw:1.9})}</span>`; }

/* ============================ DATA ============================ */
// 专家 Agent：可购买并装备到唯一助理身上

function qrSVG(seed){ let h=0; for(const c of String(seed)) h=(h*131+c.charCodeAt(0))>>>0; const N=23,px=168,cell=px/N; let r=''; const rnd=()=>{h=(h*1103515245+12345)&0x7fffffff;return (h>>>8)/0x7fffff;}; const finder=(x,y)=>`<rect x="${x*cell}" y="${y*cell}" width="${7*cell}" height="${7*cell}" rx="${cell}" fill="#1b1c20"/><rect x="${(x+1)*cell}" y="${(y+1)*cell}" width="${5*cell}" height="${5*cell}" rx="${cell*.8}" fill="#fff"/><rect x="${(x+2)*cell}" y="${(y+2)*cell}" width="${3*cell}" height="${3*cell}" rx="${cell*.6}" fill="#1b1c20"/>`; for(let y=0;y<N;y++)for(let x=0;x<N;x++){ if((x<8&&y<8)||(x>N-9&&y<8)||(x<8&&y>N-9))continue; if(rnd()>0.55) r+=`<rect x="${x*cell+cell*.12}" y="${y*cell+cell*.12}" width="${cell*.76}" height="${cell*.76}" rx="${cell*.2}" fill="#1b1c20"/>`; } return `<svg width="100%" height="100%" viewBox="0 0 ${px} ${px}"><rect width="${px}" height="${px}" fill="#fff"/>${r}${finder(0,0)}${finder(N-7,0)}${finder(0,N-7)}</svg>`; }

function refreshConvList(root){ const c=$('#convs',root); if(!c)return; c.innerHTML=''; ASSISTANT.threads.forEach(t=>c.appendChild(convItem(t))); }
function convItem(t){
  const sm=statusMeta(t.status); const on=t.id===STATE.currentThreadId;
  const last=[...t.messages].reverse().find(m=>m.kind==='msg'); const preview=last?last.text:(t.messages.slice(-1)[0]?t.messages.slice(-1)[0].text:'…');

      <div class="dim" style="font-size:11.5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${preview}</div>
      <div class="dim" style="font-size:11px;margin-top:2px">${t.startedAt}</div></div></div>`);
  it.onclick=()=>selectThread(t.id);
  return it;
}
function buildConversation(t){
  const a=ASSISTANT; const sm=statusMeta(t.status);
  const back=isMobile()?`<button class="btn btn-ghost" id="cv-back" style="padding:7px 9px;margin-right:2px">${icon('arrowL',{size:16})}</button>`:'';
  const box=el(`<div style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div class="chat-head">${back}${avatar(a.icon,a.color,34)}<div style="flex:1;min-width:0"><div style="font-weight:600;display:flex;align-items:center;gap:8px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span><span class="badge" style="background:${sm.bg};color:${sm.c}">${sm.t}</span></div><div class="dim" style="font-size:12px;margin-top:1px">${a.name} · 开始于 ${t.startedAt}</div></div></div>
    <div class="msgs" id="msgs"></div>
    <div class="composer"><textarea id="ta" rows="1" placeholder="继续和 ${a.name} 对话…"></textarea><button class="btn btn-primary" id="send" style="padding:10px 14px">${icon('send',{size:16})}</button></div></div>`);
  const bk=$('#cv-back',box); if(bk) bk.onclick=()=>{ STATE.mobileConvOpen=false; render(); };
  const msgs=$('#msgs',box);
  const paint=()=>{ msgs.innerHTML=''; t.messages.forEach(m=>msgs.appendChild(renderMsg(a,m))); msgs.scrollTop=msgs.scrollHeight; };
  paint();
  const ta=$('#ta',box);
  ta.addEventListener('input',()=>{ ta.style.height='auto'; ta.style.height=Math.min(120,ta.scrollHeight)+'px'; });
  const head=$('.chat-head .badge',box);
  const send=()=>{ const txt=ta.value.trim(); if(!txt)return;
    if(t.title==='新对话') t.title=txt.length>18?txt.slice(0,18)+'…':txt;
    t.status='active'; t.messages.push({who:'user',kind:'msg',text:txt}); ta.value=''; ta.style.height='auto'; paint();
    if(head){ head.textContent='对话中'; head.style.background='var(--run-w)'; head.style.color='var(--run)'; }
    refreshConvList();
    const typing=el(`<div class="msg them"><span style="margin-top:6px">${avatar(a.icon,a.color,30)}</span><div class="bubble typing"><span></span><span></span><span></span></div></div>`); msgs.appendChild(typing); msgs.scrollTop=msgs.scrollHeight;
    setTimeout(()=>{ typing.remove(); t.messages.push({who:'assistant',kind:'msg',text:agentReply(a,txt)}); paint(); refreshConvList(); },1100);
  };
  $('#send',box).onclick=send;
  ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
  return box;
}
function renderMsg(a,m){
  if(m.kind==='msg'){
    if(m.who==='user') return el(`<div class="msg me"><div class="bubble">${escapeHtml(m.text)}</div></div>`);
    return el(`<div class="msg them"><span style="margin-top:6px">${avatar(a.icon,a.color,30)}</span><div class="bubble">${escapeHtml(m.text)}</div></div>`);
  }
  if(m.kind==='step') return el(`<div style="align-self:stretch;display:flex;gap:8px;align-items:flex-start;padding:8px 12px;background:var(--panel);border:1px solid var(--border2);border-left:2px solid var(--accent);border-radius:8px;font-size:12.5px"><span style="color:var(--accent-d);line-height:1.4">${icon('settings',{size:13})}</span><div><span style="font-weight:600;color:var(--accent-d)">${escapeHtml(m.who==='assistant'?a.name:m.who)}</span><span class="muted"> · ${escapeHtml(m.text)}</span></div></div>`);
  const ok=m.ok; const col=ok?'var(--ok)':'var(--bad)'; const bg=ok?'var(--ok-w)':'var(--bad-w)';
  return el(`<div style="align-self:stretch;display:flex;gap:8px;align-items:flex-start;padding:8px 12px;background:${bg};border-radius:8px;font-size:12.5px;color:${col}"><span style="line-height:1.4">${ok?icon('check',{size:14}):icon('x',{size:14})}</span><div><b>${ok?'任务完成':'任务失败'}</b><span style="color:var(--text2)"> · ${escapeHtml(m.text)}</span></div></div>`);
}

function escapeHtml(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function agentReply(a,txt){
  const caps=a.caps.map(c=>cap(c).name).join('、');
  const experts=a.experts.length?a.experts.map(e=>expertById(e).name).join('、'):'（暂未装备专家）';
  if(/工单|待处理|客户|售后|退货|ticket/i.test(txt)) return '已调度「客服专家」处理：当前有 3 个待处理工单，其中 #TK-20583 为 P1。需要我升级或催办吗？';

  imRefresh=()=>{ const b=$('#imbody',m); b.innerHTML=''; b.appendChild(ASSISTANT.boundIM?imBound():imQR()); };
  $('#x',m).onclick=()=>{ ov.remove(); imRefresh=null; }; ov.onclick=e=>{ if(e.target===ov){ ov.remove(); imRefresh=null; } };
  imRefresh();
  ov.appendChild(m); document.body.appendChild(ov);
}
function imQR(){
  const a=ASSISTANT;
  const p=el(`<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center">
    <div style="width:168px;height:168px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:4px;position:relative;flex-shrink:0"><div id="qr">${qrSVG(a.name)}</div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:${a.color}">${icon(a.icon,{size:18,color:'#fff'})}</div></div></div>
    <div style="flex:1;min-width:220px"><div style="font-weight:600;font-size:15px;margin-bottom:10px">微信扫码后，直接在微信里指挥灵犀助理</div>
      <div class="muted" style="font-size:13px;line-height:1.9"><div>1 · 打开微信 →「+」→ 扫一扫</div><div>2 · 扫描左侧二维码并确认</div><div>3 · 之后在微信对话框即可直接给助理派活</div></div>
      <div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-ghost" id="rf">${icon('refresh',{size:15})}刷新</button><button class="btn btn-primary" id="sim" style="background:#16a34a">${icon('phone',{size:15})}模拟扫码绑定</button></div></div></div>`);
  $('#rf',p).onclick=()=>{ $('#qr',p).innerHTML=qrSVG(a.name+Date.now()); toast('二维码已刷新'); };
  $('#sim',p).onclick=()=>{ const s=el(`<div class="muted" style="margin-top:14px;font-size:13px;display:flex;align-items:center;gap:8px"><span class="spin">${icon('refresh',{size:14})}</span>检测到微信扫码，正在确认绑定…</div>`); p.appendChild(s); setTimeout(()=>{ a.boundIM=true; if(imRefresh)imRefresh(); rerenderView(); toast('灵犀助理已成功绑定微信'); },1300); };
  return p;
}
function imBound(){
  const a=ASSISTANT;
  const p=el(`<div>
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:14px;box-shadow:none"><div style="width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--ok-w);color:var(--ok)">${icon('message',{size:20})}</div>
      <div style="flex:1"><div style="font-weight:600;display:flex;align-items:center;gap:8px">已绑定微信 <span class="badge" style="background:var(--ok-w);color:var(--ok)">已生效</span></div><div class="dim" style="font-size:12.5px;margin-top:2px">微信昵称：${a.wxNick} · 绑定于 2026-05-25</div></div>
      <button class="btn btn-ghost" id="unbind" style="color:var(--bad)">解绑</button></div>
    <div class="dim" style="font-size:12px;margin-bottom:8px">在微信里的对话预览</div>
    <div style="background:#ededf0;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px;width:360px;max-width:100%">
      <div style="display:flex;gap:8px"><div style="width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${a.color}">${icon(a.icon,{size:15,color:'#fff'})}</div><div style="background:#fff;color:#1f2937;border-radius:12px;border-top-left-radius:4px;padding:8px 11px;max-width:78%">在的，有什么可以帮你？</div></div>
      <div style="display:flex;gap:8px;justify-content:flex-end"><div style="background:#95ec69;color:#1f2937;border-radius:12px;border-top-right-radius:4px;padding:8px 11px;max-width:78%">查下今天的待处理工单</div></div>
      <div style="display:flex;gap:8px"><div style="width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${a.color}">${icon(a.icon,{size:15,color:'#fff'})}</div><div style="background:#fff;color:#1f2937;border-radius:12px;border-top-left-radius:4px;padding:8px 11px;max-width:78%">已让客服专家处理，共 3 个待处理，其中 1 个 P1。要升级吗？</div></div></div></div>`);
  $('#unbind',p).onclick=()=>{ a.boundIM=false; if(imRefresh)imRefresh(); rerenderView(); toast('已解绑微信'); };
  return p;
}

/* ============================ BOOT ============================ */
const isMobile=()=>window.innerWidth<=760;
let _rt; window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ if(STATE.user) render(); },200); });
render();
</script>
</body>
