name = "lingxi-email-worker"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# GATEWAY_URL = 入站回调的【默认】URL 前缀(线上)。Worker POST 到 `${GATEWAY_URL}/api/email/inbound`。
# 个别测试收件人想改投到别处(如某人本地 ngrok)→ 不动这里,往 KV 加一条 override(见下)。
[vars]
GATEWAY_URL = "https://app-lingxi-dev-gateway.azurewebsites.net"

# ROUTES = 入站回调 override 表。key = `to:<localpart>`,value = 该收件人专用的 gateway base URL。
# Worker 每封信先查 KV:命中 → 走 override(测试/本地调试);未命中 → 走上面的 GATEWAY_URL。
# 改 KV 即时生效,无需重部署;本地地址各人各填,不进 git。
#   首次创建: npx wrangler kv namespace create ROUTES  → 把返回的 id 填到下面 id=
#   加:       npx wrangler kv key put --binding=ROUTES "to:devtest1" "https://你的.ngrok-free.app"
#   删:       npx wrangler kv key delete --binding=ROUTES "to:devtest1"
#   列:       npx wrangler kv key list --binding=ROUTES
[[kv_namespaces]]
binding = "ROUTES"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# INBOUND_WEBHOOK_SECRET 是机密,不写这里:
#   - 部署:wrangler secret put INBOUND_WEBHOOK_SECRET [--env test]
#   - 本地 wrangler dev:写进 .dev.vars(见 .dev.vars.example)
# 值 = gateway 的 POSTMARK_INBOUND_WEBHOOK_SECRET(Basic-Auth 的 pass)

# ─────────────────────────────────────────────────────────────
# test 环境:收 test.laifu.uncagedai.org 的入站,投到测试 gateway。
# 独立 worker 脚本 lingxi-email-worker-test,不影响顶层(laifu.uncagedai.org)那个。
# 命名环境不继承顶层 vars/kv,故下面各自声明。
# 测试 gateway 是临时地址、易变 → 不写死,部署时用 --var 覆盖:
#   npx wrangler deploy --env test --var GATEWAY_URL:https://你的临时地址
# ─────────────────────────────────────────────────────────────
[env.test]
name = "lingxi-email-worker-test"
vars = { GATEWAY_URL = "https://REPLACE-临时测试地址" }   # 兜底值;实际以 --var 为准

[[env.test.kv_namespaces]]
binding = "ROUTES"
id = "REPLACE_WITH_TEST_KV_ID"   # npx wrangler kv namespace create ROUTES --env test 后填
