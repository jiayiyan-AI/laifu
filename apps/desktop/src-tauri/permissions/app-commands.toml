[[permission]]
identifier = "allow-app-commands"
description = "允许 bundled flyout/settings/login surface 调用自身业务命令：登录 webview 编排、登出、鉴权查询、settings/flyout 显隐、受限同步目录切换/移动与同步状态查询。远程 home 不使用此权限。"
commands.allow = [
  "open_login",
  "logout",
  "is_authed",
  "show_settings_window",
  "show_sync_flyout_from_settings",
  "pick_empty_sync_dir",
  "pick_sync_move_destination",
  "configure_empty_sync_dir",
  "relocate_sync_dir",
  "get_sync_dir",
  "get_sync_status",
]
