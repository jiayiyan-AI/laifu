name: Build & Push Hermes Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/hermes/**'
      - '.github/workflows/hermes-image.yml'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target env (决定推到哪个 ACR)'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]
      tag:
        description: 'Image tag (默认 git sha)'
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  acr-build:
    runs-on: ubuntu-latest
    env:
      TARGET_ENV: ${{ github.event.inputs.env || 'dev' }}
      IMAGE_TAG: ${{ github.event.inputs.tag || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR name
        id: acr
        run: |
          ACR=$(az acr list -g "rg-lingxi-${TARGET_ENV}" --query "[0].name" -o tsv)
          echo "name=$ACR" >> "$GITHUB_OUTPUT"

      - name: ACR Build
        working-directory: docker/hermes
        env:
          ACR_NAME: ${{ steps.acr.outputs.name }}
        run: ./build-and-push.sh
